name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Build skill CLIs into skills/
        run: npm run build:skills-cli

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Skill CLI smoke test
        run: npm run smoke

  data-platform:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stockbuddy
          POSTGRES_USER: stockbuddy
          POSTGRES_PASSWORD: stockbuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockbuddy -d stockbuddy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Migrate and seed database
        env:
          DATABASE_URL: postgresql://stockbuddy:stockbuddy@localhost:5432/stockbuddy
        run: |
          npm run db:migrate
          npm run db:seed

      - name: Contract builder and E2E tests
        env:
          DATABASE_URL: postgresql://stockbuddy:stockbuddy@localhost:5432/stockbuddy
        run: npm test -- tests/data-platform.test.ts tests/data-platform-e2e.test.ts

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -f Dockerfile -t stock-buddy-mcp:test .

      - name: Test Docker container
        run: |
          docker run -d --name stock-buddy-test -p 8080:8080 \
            -e STOCK_BUDDY_HTTP=1 -e STOCK_BUDDY_PORT=8080 \
            stock-buddy-mcp:test
          sleep 3
          node scripts/docker-smoke.mjs
          docker stop stock-buddy-test && docker rm stock-buddy-test

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill metadata
        run: |
          for skill in skills/*/SKILL.md; do
            echo "Validating $skill"
            grep -q "name:" "$skill" || exit 1
            grep -q "description:" "$skill" || exit 1
            grep -q "license:" "$skill" || exit 1
          done

      - name: Check fixture files
        run: test -f skills/_fixtures/sample_input.json
