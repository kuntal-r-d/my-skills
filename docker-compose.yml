version: '3.8'

services:
  stock-buddy-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-buddy-mcp:latest
    container_name: stock-buddy-mcp
    ports:
      - "8080:8080"
    environment:
      - STOCK_BUDDY_HTTP=1
      - STOCK_BUDDY_PORT=8080
    volumes:
      - ./skills/_fixtures:/app/skills/_fixtures:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - stock-buddy-net

networks:
  stock-buddy-net:
    driver: bridge
